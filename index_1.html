<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#0a0c12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Mein Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg0:#0a0c12;--bg1:#111520;--bg2:#181d2e;--bg3:#1f2640;--bg4:#252d4a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --t1:#f0f2ff;--t2:#8892b0;--t3:#4a5275;
  --blue:#4f8ef7;--blue-d:rgba(79,142,247,0.15);
  --green:#2dd4a0;--green-d:rgba(45,212,160,0.15);
  --red:#f0614a;--red-d:rgba(240,97,74,0.15);
  --amber:#f5a623;--amber-d:rgba(245,166,35,0.15);
  --purple:#a78bfa;--purple-d:rgba(167,139,250,0.15);
  --r:14px;--rsm:9px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top,20px);
  --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg0)}
body{
  font-family:var(--font);color:var(--t1);background:var(--bg0);
  min-height:100vh;
  /* KEY FIX: allow normal scrolling */
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(75px + var(--sab));
}
input,select,textarea,button{font-family:var(--font)}

/* HEADER */
.hdr{
  padding:calc(14px + var(--sat)) 16px 12px;
  background:var(--bg0);
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid var(--border);
}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.hdr h1 span{background:linear-gradient(135deg,#4f8ef7,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-date{font-size:11px;color:var(--t3);margin-top:1px;font-family:var(--mono)}
.mnav{display:flex;align-items:center;gap:6px}
.mnav-btn{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--t2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.mnav-btn:active{opacity:.6}
.mlbl{font-size:12px;color:var(--t2);min-width:88px;text-align:center;font-weight:500}

/* SECTIONS */
.sec{display:none;padding:14px 16px 0}
.sec.active{display:block}

/* CARDS */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px}
.card-ttl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px}
.card-ttl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.kpi-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:4px}
.kpi-v{font-size:17px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:3px}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:var(--blue)}.ca{color:var(--amber)}.cp{color:var(--purple)}

/* HOME HERO */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:11px}
.hero-greet{font-size:18px;font-weight:700;margin-bottom:3px}
.hero-sub{font-size:12px;color:var(--t3)}

/* QUICK ADD */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn{padding:12px 8px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--t2);font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.quick-btn:active{background:var(--bg3);transform:scale(.97)}

/* TODAY */
.titem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.titem:last-child{border-bottom:none}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ttext{font-size:13px;flex:1}
.tmeta{font-size:11px;color:var(--t3);white-space:nowrap}

/* SEG */
.seg{display:flex;gap:3px;background:var(--bg2);border-radius:var(--rsm);padding:3px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.seg::-webkit-scrollbar{display:none}
.seg-btn{flex:1;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--t3);white-space:nowrap;min-width:65px;transition:all .15s}
.seg-btn.active{background:var(--bg0);color:var(--t1)}

/* ITEMS */
.irow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.irow:last-child{border-bottom:none}
.ileft{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imeta{font-size:11px;color:var(--t3);margin-top:2px}
.iright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.iamt{font-size:14px;font-weight:700;font-family:var(--mono);white-space:nowrap}

/* BUTTONS */
.ibtn{width:28px;height:28px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn:active{opacity:.5}
.add-btn{width:100%;padding:12px;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--rsm);color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px}
.add-btn:active{background:var(--bg3)}

/* BADGE */
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.bdg-r{background:var(--red-d);color:var(--red)}
.bdg-a{background:var(--amber-d);color:var(--amber)}
.bdg-b{background:var(--blue-d);color:var(--blue)}
.bdg-g{background:var(--green-d);color:var(--green)}
.bdg-p{background:var(--purple-d);color:var(--purple)}

/* PROGRESS */
.pbar-lbls{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px}
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s}

/* BIG ITEM */
.bigitem{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.bigitem-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.bigitem-name{font-size:15px;font-weight:600}
.bigitem-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--t2);margin-bottom:10px}
.bigitem-meta b{color:var(--t1)}

/* TODO */
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:none;transition:all .2s}
.todo-check.done{background:var(--green);border-color:var(--green)}
.todo-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:14px;font-weight:500}
.todo-title.done{opacity:.4;text-decoration:line-through}
.todo-meta{font-size:11px;color:var(--t3);margin-top:3px}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:7px}

/* KALENDER */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-dh{font-size:10px;color:var(--t3);text-align:center;font-weight:600;padding:4px 0;text-transform:uppercase}
.cal-d{min-height:34px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px;cursor:pointer;position:relative}
.cal-d:active{background:var(--bg3)}
.cal-d.other .cal-n{opacity:.3}
.cal-d.today .cal-n{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-d.sel{background:var(--blue-d);border:1px solid var(--blue)}
.cal-d.hasev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--amber);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.cal-n{font-size:13px;font-weight:500;line-height:1}
.ev-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ev-item:last-child{border-bottom:none}
.ev-stripe{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500}
.ev-time{font-size:11px;color:var(--t3);margin-top:2px}

/* RECHNUNGEN */
.ritem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.ritem:last-child{border-bottom:none}
.ricon{width:36px;height:36px;border-radius:var(--rsm);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rbody{flex:1;min-width:0}
.rname{font-size:14px;font-weight:500}
.rdue{font-size:11px;color:var(--t3);margin-top:2px}
.rright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ramt{font-size:14px;font-weight:700;font-family:var(--mono)}
.frist{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.fok{background:var(--green-d);color:var(--green)}
.fwarn{background:var(--amber-d);color:var(--amber)}
.furg{background:var(--red-d);color:var(--red)}
.fdone{background:rgba(100,100,100,.15);color:var(--t3)}

/* CHART */
.cw{position:relative;width:100%;height:180px}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.mbg.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:22px 16px calc(24px + var(--sab));width:100%;max-width:520px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mttl{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:var(--bg3);border:none;color:var(--t2);width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.frow input,.frow select,.frow textarea{width:100%;padding:11px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--t1);font-size:16px;font-family:var(--font);outline:none;-webkit-appearance:none;resize:none}
.frow input:focus,.frow select:focus{border-color:var(--blue)}
.frow select option{background:var(--bg1)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1;padding:13px;border-radius:var(--rsm);font-size:15px;font-family:var(--font);font-weight:600;cursor:pointer}
.bsave{background:var(--blue);color:#fff;border:none}
.bsave:active{opacity:.8}
.bcnl{background:none;border:1px solid var(--border2);color:var(--t2)}

/* EMPTY */
.empty{text-align:center;padding:28px 0;color:var(--t3);font-size:13px}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,12,18,.97);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  display:flex;justify-content:space-around;
  padding:9px 0 calc(9px + var(--sab));
  z-index:200;
}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--t3);cursor:pointer;padding:0 4px;font-size:9px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;min-width:52px;position:relative}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb.active{color:var(--blue)}
.nb-dot{min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;position:absolute;top:-3px;right:2px;padding:0 3px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <h1>◈ <span>Mein Dashboard</span></h1>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
    <div class="mnav" id="month-ctrl" style="display:none">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="mlbl" id="mlbl"></span>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="sec-home" class="sec active">
  <div class="hero">
    <div class="hero-greet" id="greet">Hallo! 👋</div>
    <div class="hero-sub">Hier ist dein Überblick für heute.</div>
  </div>
  <div class="kpi-grid" id="home-kpis"></div>
  <div class="card">
    <div class="card-ttl">📌 Dringende Sachen</div>
    <div id="today-list"></div>
  </div>
  <div class="card">
    <div class="card-ttl">⚡ Schnell hinzufügen</div>
    <div class="quick-grid">
      <button class="quick-btn" onclick="openModal('todo')">✅ Todo</button>
      <button class="quick-btn" onclick="openModal('event')">📅 Termin</button>
      <button class="quick-btn" onclick="openModal('rechnung')">🧾 Rechnung</button>
      <button class="quick-btn" onclick="openModal('einnahme')">💰 Einnahme</button>
    </div>
  </div>
</div>

<!-- FINANZEN -->
<div id="sec-fin" class="sec">
  <div class="seg" id="fseg">
    <button class="seg-btn active" onclick="fTab('ue',this)">Übersicht</button>
    <button class="seg-btn" onclick="fTab('ein',this)">Einnahmen</button>
    <button class="seg-btn" onclick="fTab('aus',this)">Ausgaben</button>
    <button class="seg-btn" onclick="fTab('sch',this)">Schulden</button>
    <button class="seg-btn" onclick="fTab('spa',this)">Sparziele</button>
  </div>
  <div id="f-ue">
    <div class="kpi-grid" id="fin-kpis"></div>
    <div class="card"><div class="card-ttl">Cashflow</div><div class="cw"><canvas id="ch-cf"></canvas></div></div>
    <div class="card"><div class="card-ttl">Ausgaben Mix</div><div class="cw"><canvas id="ch-aus"></canvas></div></div>
  </div>
  <div id="f-ein" style="display:none">
    <div class="card">
      <div class="card-ttl" style="color:var(--green)">Einnahmen</div>
      <div id="ein-list"></div>
      <button class="add-btn" onclick="openModal('einnahme')">＋ Einnahme hinzufügen</button>
    </div>
  </div>
  <div id="f-aus" style="display:none">
    <div class="card">
      <div class="card-ttl" style="color:var(--red)">Ausgaben</div>
      <div id="aus-list"></div>
      <button class="add-btn" onclick="openModal('ausgabe')">＋ Ausgabe hinzufügen</button>
    </div>
  </div>
  <div id="f-sch" style="display:none">
    <div id="sch-list"></div>
    <button class="add-btn" onclick="openModal('schuld')">＋ Schuld / Kredit hinzufügen</button>
  </div>
  <div id="f-spa" style="display:none">
    <div id="spa-list"></div>
    <button class="add-btn" onclick="openModal('sparziel')">＋ Sparziel hinzufügen</button>
  </div>
</div>

<!-- TODOS -->
<div id="sec-todo" class="sec">
  <div class="seg" id="tseg">
    <button class="seg-btn active" onclick="tFilter('alle',this)">Alle</button>
    <button class="seg-btn" onclick="tFilter('heute',this)">Heute</button>
    <button class="seg-btn" onclick="tFilter('hoch',this)">🔴 Hoch</button>
    <button class="seg-btn" onclick="tFilter('erledigt',this)">✓ Fertig</button>
  </div>
  <div id="todo-list"></div>
  <button class="add-btn" onclick="openModal('todo')">＋ Aufgabe hinzufügen</button>
</div>

<!-- KALENDER -->
<div id="sec-kal" class="sec">
  <div class="card">
    <div class="card-ttl-row">
      <span class="card-ttl" id="cal-lbl" style="margin-bottom:0"></span>
    </div>
    <div class="cal-grid" id="cal-hdr"></div>
    <div class="cal-grid" id="cal-days"></div>
  </div>
  <div class="card">
    <div class="card-ttl" id="cal-ev-lbl">Kommende Termine</div>
    <div id="ev-list"></div>
    <button class="add-btn" onclick="openModal('event')">＋ Termin hinzufügen</button>
  </div>
</div>

<!-- RECHNUNGEN -->
<div id="sec-rech" class="sec">
  <div class="seg" id="rseg">
    <button class="seg-btn active" onclick="rFilter('alle',this)">Alle</button>
    <button class="seg-btn" onclick="rFilter('offen',this)">Offen</button>
    <button class="seg-btn" onclick="rFilter('faellig',this)">Fällig</button>
    <button class="seg-btn" onclick="rFilter('bezahlt',this)">Bezahlt</button>
  </div>
  <div class="card">
    <div class="card-ttl-row">
      <span class="card-ttl" style="margin-bottom:0">Rechnungen & Fristen</span>
      <span id="rech-sum" style="font-size:11px;color:var(--t3)"></span>
    </div>
    <div id="rech-list"></div>
    <button class="add-btn" onclick="openModal('rechnung')">＋ Rechnung hinzufügen</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb active" id="nb-home" onclick="goTab('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </button>
  <button class="nb" id="nb-fin" onclick="goTab('fin',this)">
    <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finanzen
  </button>
  <button class="nb" id="nb-todo" onclick="goTab('todo',this)" style="position:relative">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span id="tdot" class="nb-dot" style="display:none"></span>Todos
  </button>
  <button class="nb" id="nb-kal" onclick="goTab('kal',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Kalender
  </button>
  <button class="nb" id="nb-rech" onclick="goTab('rech',this)" style="position:relative">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span id="rdot" class="nb-dot" style="display:none"></span>Rechnungen
  </button>
</nav>

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="modal">
    <div class="mttl">
      <span id="mttl-txt">Hinzufügen</span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="mfields"></div>
    <div class="mbtns">
      <button class="bcnl" onclick="closeModal()">Abbrechen</button>
      <button class="bsave" onclick="saveModal()">Speichern ✓</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────
const SK='life_v5';
const NOW=new Date(); NOW.setHours(0,0,0,0);
const TODAY=ds(NOW);
let S={ein:[],aus:[],sch:[],spa:[],todos:[],events:[],rech:[]};
function ds(d){return d.toISOString().split('T')[0]}
function load(){try{const d=localStorage.getItem(SK);if(d)S=Object.assign(S,JSON.parse(d))}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,5)}
function fmt(v){return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v||0)}
function pct(v,t){return t>0?Math.min(100,Math.round(v/t*100)):0}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():''}
function gn(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0}
function sopts(a,s){return a.map(x=>`<option${x===s?' selected':''}>${x}</option>`).join('')}
function fmtDate(str){if(!str)return'';const d=new Date(str+'T00:00:00');return d.toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'})}

// ── SAMPLE DATA ───────────────────────────────────────

  ];
  S.aus=[
    {id:uid(),name:'Miete',amt:750,cat:'Miete/Wohnen',typ:'Fixkosten'},
    {id:uid(),name:'Lebensmittel',amt:280,cat:'Lebensmittel',typ:'Variabel'},
    {id:uid(),name:'Streaming',amt:27,cat:'Streaming',typ:'Fixkosten'},
    {id:uid(),name:'Handy',amt:35,cat:'Handy/Internet',typ:'Fixkosten'},

    {id:uid(),name:'Gym',amt:45,cat:'Sport',typ:'Fixkosten'},
  ];
  S.sch=[
    {id:uid(),name:'Auto-Kredit',total:8400,paid:3200,rate:280,zins:3.9},
    {id:uid(),name:'Dispo',total:1500,paid:400,rate:150,zins:12.5},
  ];
  S.spa=[
    {id:uid(),name:'Urlaub 2026',ziel:2000,gespart:650,monat:200},
    {id:uid(),name:'Notfallreserve',ziel:5000,gespart:1200,monat:150},
  ];
  S.todos=[
    {id:uid(),title:'Steuererklärung abschicken',done:false,prio:'hoch',due:ds(d1),cat:'Finanzen',note:''},
    {id:uid(),title:'Zahnarzt Termin vereinbaren',done:false,prio:'mittel',due:ds(d2),cat:'Gesundheit',note:''},
    {id:uid(),title:'Reifenwechsel Auto',done:false,prio:'mittel',due:ds(d3),cat:'Auto',note:''},
    {id:uid(),title:'Geburtstagsgeschenk kaufen',done:false,prio:'hoch',due:ds(d1),cat:'Privat',note:'Für Mama'},
    {id:uid(),title:'Kühlschrank putzen',done:true,prio:'niedrig',due:'',cat:'Haushalt',note:''},
  ];
  S.events=[
    {id:uid(),title:'Arzttermin',date:ds(d1),time:'10:30',end:'11:00',loc:'Dr. Müller',color:'#f0614a',note:''},
    {id:uid(),title:'Meeting mit Chef',date:ds(d2),time:'14:00',end:'15:00',loc:'Büro',color:'#4f8ef7',note:''},
    {id:uid(),title:'Freunde treffen',date:ds(d3),time:'19:00',end:'22:00',loc:'Restaurant',color:'#2dd4a0',note:''},
  ];
  S.rech=[
    {id:uid(),name:'Stromrechnung',amt:145,due:ds(d1),cat:'Wohnen',status:'offen',icon:'⚡',wdk:false},
    {id:uid(),name:'KFZ-Versicherung',amt:312,due:ds(d2),cat:'Auto',status:'offen',icon:'🚗',wdk:true},
    {id:uid(),name:'Krankenkasse',amt:240,due:ds(d3),cat:'Versicherung',status:'offen',icon:'🏥',wdk:true},
    {id:uid(),name:'Internet',amt:39.99,due:ds(d4),cat:'Wohnen',status:'bezahlt',icon:'🌐',wdk:true},
  ];
  save();

// ── TABS ─────────────────────────────────────────────
let curTab='home',fCur='ue',tFilt='alle',rFilt='alle',calSel=TODAY;
let curM=NOW.getMonth(),curY=NOW.getFullYear();
const MOS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MOS_S=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function goTab(id,btn){
  curTab=id;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('month-ctrl').style.display=(id==='fin')?'flex':'none';
  window.scrollTo({top:0,behavior:'smooth'});
  if(id==='home')renderHome();
  else if(id==='fin')renderFin();
  else if(id==='todo')renderTodos();
  else if(id==='kal')renderCal();
  else if(id==='rech')renderRech();
}

function fTab(t,btn){
  fCur=t;
  document.querySelectorAll('#fseg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['ue','ein','aus','sch','spa'].forEach(x=>document.getElementById('f-'+x).style.display=x===t?'block':'none');
  if(t==='ue')setTimeout(renderFinCharts,60);
}
function tFilter(f,btn){tFilt=f;document.querySelectorAll('#tseg .seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodos()}
function rFilter(f,btn){rFilt=f;document.querySelectorAll('#rseg .seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRech()}
function changeMonth(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}document.getElementById('mlbl').textContent=MOS_S[curM]+' '+curY;renderFin()}

// ── HOME ─────────────────────────────────────────────
function renderHome(){
  const h=new Date().getHours();
  document.getElementById('greet').textContent=h<12?'Guten Morgen! ☀️':h<17?'Guten Tag! 👋':'Guten Abend! 🌙';
  const te=S.ein.reduce((s,e)=>s+e.amt,0);
  const ta=S.aus.reduce((s,e)=>s+e.amt,0);
  const open=S.todos.filter(t=>!t.done).length;
  const faellig=S.rech.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY).length;
  const nxt=S.events.filter(e=>e.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date))[0];
  document.getElementById('home-kpis').innerHTML=`
    <div class="kpi" onclick="goTab('fin',document.getElementById('nb-fin'))"><div class="kpi-l">Cashflow</div><div class="kpi-v ${te-ta>=0?'cg':'cr'}">${fmt(te-ta)}</div><div class="kpi-s">${fmt(te)} Einnahmen</div></div>
    <div class="kpi" onclick="goTab('todo',document.getElementById('nb-todo'))"><div class="kpi-l">Offene Todos</div><div class="kpi-v cb">${open}</div><div class="kpi-s">Aufgaben offen</div></div>
    <div class="kpi" onclick="goTab('rech',document.getElementById('nb-rech'))"><div class="kpi-l">Fällige Rechnungen</div><div class="kpi-v ${faellig>0?'cr':'cg'}">${faellig}</div><div class="kpi-s">jetzt fällig</div></div>
    <div class="kpi" onclick="goTab('kal',document.getElementById('nb-kal'))"><div class="kpi-l">Nächster Termin</div><div class="kpi-v cp" style="font-size:12px;font-family:var(--font)">${nxt?nxt.title:'–'}</div><div class="kpi-s">${nxt?fmtDate(nxt.date):'Nichts geplant'}</div></div>`;
  const items=[];
  S.todos.filter(t=>!t.done&&t.due&&t.due<=TODAY).forEach(t=>items.push({dot:t.prio==='hoch'?'#f0614a':'#f5a623',text:t.title,meta:t.due<TODAY?'⚠️ Überfällig':'📌 Heute'}));
  S.events.filter(e=>e.date===TODAY).forEach(e=>items.push({dot:e.color||'#a78bfa',text:e.title,meta:'📅 '+e.time}));
  S.rech.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY).forEach(r=>items.push({dot:'#f5a623',text:r.name,meta:'🧾 '+fmt(r.amt)}));
  const el=document.getElementById('today-list');
  if(!items.length){el.innerHTML='<div class="empty">🎉 Alles erledigt! Kein Handlungsbedarf.</div>';return;}
  el.innerHTML=items.map(i=>`<div class="titem"><div class="tdot" style="background:${i.dot}"></div><div class="ttext">${i.text}</div><div class="tmeta">${i.meta}</div></div>`).join('');
}

// ── FINANZEN ─────────────────────────────────────────
function renderFin(){
  document.getElementById('mlbl').textContent=MOS_S[curM]+' '+curY;
  const te=S.ein.reduce((s,e)=>s+e.amt,0),ta=S.aus.reduce((s,e)=>s+e.amt,0),cf=te-ta;
  const ts=S.sch.reduce((s,e)=>s+Math.max(0,e.total-e.paid),0);
  const tg=S.spa.reduce((s,e)=>s+e.gespart,0);
  const sq=te>0?pct(cf,te):0;
  document.getElementById('fin-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-l">Einnahmen</div><div class="kpi-v cg">${fmt(te)}</div><div class="kpi-s">Monat</div></div>
    <div class="kpi"><div class="kpi-l">Ausgaben</div><div class="kpi-v cr">${fmt(ta)}</div><div class="kpi-s">Monat</div></div>
    <div class="kpi"><div class="kpi-l">Cashflow</div><div class="kpi-v ${cf>=0?'cb':'cr'}">${fmt(cf)}</div><div class="kpi-s">Sparquote ${sq}%</div></div>
    <div class="kpi"><div class="kpi-l">Restschulden</div><div class="kpi-v ca">${fmt(ts)}</div><div class="kpi-s">${S.sch.length} Kredit(e)</div></div>
    <div class="kpi"><div class="kpi-l">Gespart</div><div class="kpi-v cb">${fmt(tg)}</div><div class="kpi-s">${S.spa.length} Ziel(e)</div></div>
    <div class="kpi"><div class="kpi-l">Rate/Mon.</div><div class="kpi-v ca">${fmt(S.sch.reduce((s,e)=>s+e.rate,0))}</div><div class="kpi-s">Tilgung</div></div>`;
  renderEin();renderAus();renderSch();renderSpa();
  if(fCur==='ue')setTimeout(renderFinCharts,60);
}

let chCF=null,chAUS=null;
function renderFinCharts(){
  const te=S.ein.reduce((s,e)=>s+e.amt,0),ta=S.aus.reduce((s,e)=>s+e.amt,0),cf=te-ta;
  if(chCF)chCF.destroy();
  chCF=new Chart(document.getElementById('ch-cf').getContext('2d'),{type:'bar',data:{labels:['Einnahmen','Ausgaben','Cashflow'],datasets:[{data:[te,ta,cf],backgroundColor:['rgba(45,212,160,.8)','rgba(240,97,74,.8)',cf>=0?'rgba(79,142,247,.8)':'rgba(240,97,74,.8)'],borderRadius:8,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#4a5275',font:{size:10},callback:v=>'€'+Math.round(v).toLocaleString('de-DE')},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},x:{ticks:{color:'#8892b0',font:{size:11}},grid:{display:false},border:{display:false}}}}});
  const cats={};S.aus.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amt});
  const pal=['#a78bfa','#2dd4a0','#f0614a','#4f8ef7','#f5a623','#f472b6','#34d399','#fb923c'];
  if(chAUS)chAUS.destroy();
  chAUS=new Chart(document.getElementById('ch-aus').getContext('2d'),{type:'doughnut',data:{labels:Object.keys(cats).length?Object.keys(cats):['Keine Daten'],datasets:[{data:Object.values(cats).length?Object.values(cats):[1],backgroundColor:Object.keys(cats).length?pal.slice(0,Object.keys(cats).length):['#252d4a'],borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:'#8892b0',font:{size:10},padding:8,boxWidth:8,boxHeight:8}}}}});
}

const TSV=s=>`<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
const ESV=s=>`<svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`;

function renderEin(){
  const el=document.getElementById('ein-list');
  if(!S.ein.length){el.innerHTML='<div class="empty">Noch keine Einnahmen.</div>';return;}
  el.innerHTML=S.ein.map(e=>`<div class="irow"><div class="ileft"><div class="iname">${e.name}</div><div class="imeta">${e.cat}${e.note?' · '+e.note:''}</div></div><div class="iright"><span class="iamt cg">+${fmt(e.amt)}</span><button class="ibtn" onclick="openModal('einnahme','${e.id}')">${ESV()}</button><button class="ibtn" onclick="del('ein','${e.id}')">${TSV()}</button></div></div>`).join('');
}
function renderAus(){
  const el=document.getElementById('aus-list');
  if(!S.aus.length){el.innerHTML='<div class="empty">Noch keine Ausgaben.</div>';return;}
  el.innerHTML=S.aus.map(e=>`<div class="irow"><div class="ileft"><div class="iname">${e.name}</div><div class="imeta">${e.cat} · <span class="bdg ${e.typ==='Fixkosten'?'bdg-a':'bdg-b'}">${e.typ}</span></div></div><div class="iright"><span class="iamt cr">-${fmt(e.amt)}</span><button class="ibtn" onclick="openModal('ausgabe','${e.id}')">${ESV()}</button><button class="ibtn" onclick="del('aus','${e.id}')">${TSV()}</button></div></div>`).join('');
}
function renderSch(){
  const el=document.getElementById('sch-list');
  if(!S.sch.length){el.innerHTML='<div class="empty">🎉 Keine Schulden!</div>';return;}
  el.innerHTML=S.sch.map(e=>{const rest=Math.max(0,e.total-e.paid),p=pct(e.paid,e.total),mo=e.rate>0?Math.ceil(rest/e.rate):null;return`<div class="bigitem"><div class="bigitem-head"><span class="bigitem-name">${e.name}</span><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('schuld','${e.id}')">${ESV()}</button><button class="ibtn" onclick="del('sch','${e.id}')">${TSV()}</button></div></div><div class="bigitem-meta"><span>Restschuld: <b class="cr">${fmt(rest)}</b></span>${e.rate?`<span>Rate: <b>${fmt(e.rate)}/Mon.</b></span>`:''} ${e.zins?`<span>Zins: <b>${e.zins}%</b></span>`:''} ${mo?`<span>~<b>${mo} Monate</b></span>`:''}</div><div class="pbar-lbls"><span>Abgezahlt ${p}%</span><span>${fmt(e.paid)} / ${fmt(e.total)}</span></div><div class="pbar"><div class="pfill" style="width:${p}%;background:var(--green)"></div></div></div>`}).join('');
}
function renderSpa(){
  const el=document.getElementById('spa-list');
  if(!S.spa.length){el.innerHTML='<div class="empty">Noch keine Sparziele.</div>';return;}
  el.innerHTML=S.spa.map(e=>{const p=pct(e.gespart,e.ziel),rest=Math.max(0,e.ziel-e.gespart),mo=e.monat>0?Math.ceil(rest/e.monat):null;return`<div class="bigitem"><div class="bigitem-head"><span class="bigitem-name">${e.name}</span><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('sparziel','${e.id}')">${ESV()}</button><button class="ibtn" onclick="del('spa','${e.id}')">${TSV()}</button></div></div><div class="bigitem-meta"><span>Gespart: <b class="cb">${fmt(e.gespart)}</b></span><span>Ziel: <b>${fmt(e.ziel)}</b></span>${mo?`<span>~<b>${mo} Monate</b></span>`:''} ${e.monat?`<span>Einzahlung: <b>${fmt(e.monat)}/Mon.</b></span>`:''}</div><div class="pbar-lbls"><span>${p}% erreicht</span><span>Noch: ${fmt(rest)}</span></div><div class="pbar"><div class="pfill" style="width:${p}%;background:var(--blue)"></div></div></div>`}).join('');
}

// ── TODOS ─────────────────────────────────────────────
const PCOL={hoch:'#f0614a',mittel:'#f5a623',niedrig:'#4f8ef7'};
function renderTodos(){
  let list=[...S.todos];
  if(tFilt==='heute')list=list.filter(t=>!t.done&&t.due===TODAY);
  else if(tFilt==='hoch')list=list.filter(t=>!t.done&&t.prio==='hoch');
  else if(tFilt==='erledigt')list=list.filter(t=>t.done);
  else list=list.filter(t=>!t.done);
  list.sort((a,b)=>({hoch:0,mittel:1,niedrig:2}[a.prio]||1)-({hoch:0,mittel:1,niedrig:2}[b.prio]||1));
  const el=document.getElementById('todo-list');
  if(!list.length){el.innerHTML='<div class="empty">Keine Aufgaben hier.</div>';return;}
  el.innerHTML=list.map(t=>`<div class="todo-item"><div class="prio-dot" style="background:${PCOL[t.prio]||'#4f8ef7'}"></div><div class="todo-check ${t.done?'done':''}" onclick="toggleTodo('${t.id}')"></div><div class="todo-body"><div class="todo-title ${t.done?'done':''}">${t.title}</div><div class="todo-meta">${t.cat?`<span class="bdg bdg-p">${t.cat}</span> `:''}${t.due?'📅 '+fmtDate(t.due):''}${t.due&&t.due<TODAY&&!t.done?' <span style="color:var(--red)">⚠️ Überfällig</span>':''}</div></div><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('todo','${t.id}')">${ESV()}</button><button class="ibtn" onclick="del('todos','${t.id}')">${TSV()}</button></div></div>`).join('');
  const open=S.todos.filter(t=>!t.done).length;
  const dot=document.getElementById('tdot');
  dot.style.display=open>0?'flex':'none';
  dot.textContent=open>9?'9+':open;
}
function toggleTodo(id){const t=S.todos.find(x=>x.id===id);if(t){t.done=!t.done;save();renderTodos();}}

// ── KALENDER ─────────────────────────────────────────
const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
function renderCal(){
  const first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  document.getElementById('cal-lbl').textContent=MOS[curM]+' '+curY;
  document.getElementById('cal-hdr').innerHTML=DAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  let dow=(first.getDay()+6)%7;
  const days=[];
  for(let i=0;i<dow;i++){const dd=new Date(curY,curM,1-dow+i);days.push({date:ds(dd),num:dd.getDate(),other:true});}
  for(let i=1;i<=last.getDate();i++)days.push({date:ds(new Date(curY,curM,i)),num:i,other:false});
  while(days.length%7!==0){const dd=new Date(curY,curM+1,days.length-last.getDate()-dow+1);days.push({date:ds(dd),num:dd.getDate(),other:true});}
  const evDates=new Set(S.events.map(e=>e.date));
  document.getElementById('cal-days').innerHTML=days.map(d=>`<div class="cal-d ${d.other?'other':''} ${d.date===TODAY?'today':''} ${d.date===calSel?'sel':''} ${evDates.has(d.date)?'hasev':''}" onclick="calSel='${d.date}';renderCal()"><span class="cal-n">${d.num}</span></div>`).join('');
  const evs=calSel===TODAY?S.events.filter(e=>e.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)):S.events.filter(e=>e.date===calSel).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('cal-ev-lbl').textContent=calSel===TODAY?'Kommende Termine':'Termine am '+fmtDate(calSel);
  const el=document.getElementById('ev-list');
  if(!evs.length){el.innerHTML='<div class="empty">Keine Termine.</div>';return;}
  el.innerHTML=evs.map(e=>`<div class="ev-item"><div class="ev-stripe" style="background:${e.color||'#4f8ef7'}"></div><div class="ev-body"><div class="ev-title">${e.title}</div><div class="ev-time">${e.date!==calSel?fmtDate(e.date)+' · ':''}${e.time}${e.end?' – '+e.end:''} Uhr${e.loc?' · '+e.loc:''}</div>${e.note?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${e.note}</div>`:''}</div><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('event','${e.id}')">${ESV()}</button><button class="ibtn" onclick="del('events','${e.id}')">${TSV()}</button></div></div>`).join('');
}

// ── RECHNUNGEN ───────────────────────────────────────
function dDiff(due){const d=new Date(due+'T00:00:00');return Math.round((d-NOW)/(864e5))}
function renderRech(){
  let list=[...S.rech];
  if(rFilt==='offen')list=list.filter(r=>r.status==='offen'&&r.due>TODAY);
  else if(rFilt==='faellig')list=list.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY);
  else if(rFilt==='bezahlt')list=list.filter(r=>r.status==='bezahlt');
  list.sort((a,b)=>a.due.localeCompare(b.due));
  const offen=S.rech.filter(r=>r.status!=='bezahlt');
  document.getElementById('rech-sum').textContent=offen.length+' offen · '+fmt(offen.reduce((s,r)=>s+r.amt,0));
  const el=document.getElementById('rech-list');
  if(!list.length){el.innerHTML='<div class="empty">Keine Einträge.</div>';return;}
  el.innerHTML=list.map(r=>{
    const diff=dDiff(r.due),bz=r.status==='bezahlt';
    let fc,ft;
    if(bz){fc='fdone';ft='✓ Bezahlt';}
    else if(diff<0){fc='furg';ft=Math.abs(diff)+'T überfällig';}
    else if(diff===0){fc='furg';ft='Heute fällig!';}
    else if(diff<=5){fc='fwarn';ft='in '+diff+' Tagen';}
    else{fc='fok';ft='in '+diff+' Tagen';}
    return`<div class="ritem"><div class="ricon">${r.icon||'🧾'}</div><div class="rbody"><div class="rname">${r.name}${r.wdk?' 🔄':''}</div><div class="rdue">${r.cat} · ${fmtDate(r.due)}</div></div><div class="rright"><div class="ramt ${bz?'':'ca'}">${fmt(r.amt)}</div><div class="frist ${fc}">${ft}</div><div style="display:flex;gap:4px;margin-top:3px">${!bz?`<button class="ibtn" onclick="payR('${r.id}')" style="width:auto;padding:0 7px;border-radius:5px;font-size:11px">✓ Bezahlt</button>`:''}
    <button class="ibtn" onclick="openModal('rechnung','${r.id}')">${ESV()}</button><button class="ibtn" onclick="del('rech','${r.id}')">${TSV()}</button></div></div></div>`;
  }).join('');
  const f=S.rech.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY).length;
  const rd=document.getElementById('rdot');rd.style.display=f>0?'flex':'none';rd.textContent=f>9?'9+':f;
}
function payR(id){const r=S.rech.find(x=>x.id===id);if(r){r.status='bezahlt';save();renderRech();}}

// ── MODAL ─────────────────────────────────────────────
let aM=null,eId=null;
const MT={einnahme:'Einnahme',ausgabe:'Ausgabe',schuld:'Schuld/Kredit',sparziel:'Sparziel',todo:'Aufgabe',event:'Termin',rechnung:'Rechnung/Frist'};
const C_EIN=['Gehalt','Bonus','Nebenjob','Freelance','Mieteinnahmen','Zinsen','Dividenden','Sonstiges'];
const C_AUS=['Miete/Wohnen','Lebensmittel','Transport','KFZ','Versicherungen','Streaming','Handy/Internet','Sport','Kleidung','Restaurant','Drogerie','Urlaub','Sonstiges'];
const C_TODO=['Arbeit','Finanzen','Gesundheit','Haushalt','Familie','Privat','Auto','Einkaufen','Sonstiges'];
const C_RECH=['Wohnen','Auto','Versicherung','Gesundheit','Technik','Abo','Behörde','Sonstiges'];
const EVC=['#4f8ef7','#2dd4a0','#f0614a','#f5a623','#a78bfa','#f472b6'];
const MKEY={einnahme:'ein',ausgabe:'aus',schuld:'sch',sparziel:'spa',todo:'todos',event:'events',rechnung:'rech'};

function openModal(type,id){
  aM=type;eId=id||null;
  document.getElementById('mttl-txt').textContent=(id?'Bearbeiten: ':'Neu: ')+(MT[type]||type);
  document.getElementById('mfields').innerHTML=buildFields(type,id);
  document.getElementById('mbg').classList.add('open');
  setTimeout(()=>{const f=document.getElementById('f-name')||document.getElementById('f-title');if(f)f.focus();},200);
}
function closeModal(){document.getElementById('mbg').classList.remove('open');aM=null;eId=null;}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeModal();});

function getObj(type,id){const k=MKEY[type];return id&&S[k]?S[k].find(x=>x.id===id)||{}:{};}
function vv(o,k,fb=''){return o[k]!==undefined?o[k]:fb}

function buildFields(type,id){
  const o=getObj(type,id);
  const nf=`<div class="frow"><label>Bezeichnung</label><input id="f-name" type="text" value="${vv(o,'name')}" autocomplete="off"></div>`;
  const af=`<div class="frow"><label>Betrag (€)</label><input id="f-amt" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'amt','')}"></div>`;
  if(type==='einnahme')return nf+af+`<div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_EIN,vv(o,'cat','Gehalt'))}</select></div><div class="frow"><label>Notiz</label><input id="f-note" type="text" value="${vv(o,'note')}"></div>`;
  if(type==='ausgabe')return nf+af+`<div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_AUS,vv(o,'cat','Miete/Wohnen'))}</select></div><div class="frow"><label>Typ</label><select id="f-typ">${sopts(['Fixkosten','Variabel'],vv(o,'typ','Fixkosten'))}</select></div>`;
  if(type==='schuld')return nf+`<div class="frow2"><div class="frow"><label>Gesamtbetrag (€)</label><input id="f-total" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'total','')}"></div><div class="frow"><label>Bezahlt (€)</label><input id="f-paid" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'paid','')}"></div></div><div class="frow2"><div class="frow"><label>Rate/Monat (€)</label><input id="f-rate" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'rate','')}"></div><div class="frow"><label>Zinssatz (%)</label><input id="f-zins" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'zins','')}"></div></div>`;
  if(type==='sparziel')return nf+`<div class="frow2"><div class="frow"><label>Zielbetrag (€)</label><input id="f-ziel" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'ziel','')}"></div><div class="frow"><label>Gespart (€)</label><input id="f-gespart" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'gespart','')}"></div></div><div class="frow"><label>Einzahlung/Monat (€)</label><input id="f-monat" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'monat','')}"></div>`;
  if(type==='todo')return`<div class="frow"><label>Aufgabe</label><input id="f-title" type="text" value="${vv(o,'title')}" autocomplete="off"></div><div class="frow2"><div class="frow"><label>Priorität</label><select id="f-prio">${sopts(['hoch','mittel','niedrig'],vv(o,'prio','mittel'))}</select></div><div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_TODO,vv(o,'cat','Privat'))}</select></div></div><div class="frow"><label>Fällig am</label><input id="f-due" type="date" value="${vv(o,'due',TODAY)}"></div><div class="frow"><label>Notiz</label><textarea id="f-note" rows="2">${vv(o,'note')}</textarea></div>`;
  if(type==='event')return`<div class="frow"><label>Titel</label><input id="f-title" type="text" value="${vv(o,'title')}" autocomplete="off"></div><div class="frow"><label>Datum</label><input id="f-date" type="date" value="${vv(o,'date',calSel)}"></div><div class="frow2"><div class="frow"><label>Von</label><input id="f-time" type="time" value="${vv(o,'time','09:00')}"></div><div class="frow"><label>Bis</label><input id="f-end" type="time" value="${vv(o,'end','10:00')}"></div></div><div class="frow"><label>Ort</label><input id="f-loc" type="text" value="${vv(o,'loc','')}"></div><div class="frow"><label>Farbe</label><div style="display:flex;gap:8px;margin-top:4px">${EVC.map(c=>`<div onclick="pickColor('${c}')" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${vv(o,'color','#4f8ef7')===c?'#fff':'transparent'}" id="ec-${c.slice(1)}"></div>`).join('')}</div><input type="hidden" id="f-color" value="${vv(o,'color','#4f8ef7')}"></div><div class="frow"><label>Notiz</label><textarea id="f-note" rows="2">${vv(o,'note')}</textarea></div>`;
  if(type==='rechnung')return nf+af+`<div class="frow2"><div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_RECH,vv(o,'cat','Wohnen'))}</select></div><div class="frow"><label>Fällig am</label><input id="f-due" type="date" value="${vv(o,'due',TODAY)}"></div></div><div class="frow2"><div class="frow"><label>Icon (Emoji)</label><input id="f-icon" type="text" placeholder="🧾" value="${vv(o,'icon','🧾')}" style="width:80px"></div><div class="frow"><label>Wiederkehrend</label><select id="f-wdk"><option value="0">Einmalig</option><option value="1" ${vv(o,'wdk',false)?'selected':''}>Ja</option></select></div></div>`;
  return'';
}

function pickColor(c){
  document.getElementById('f-color').value=c;
  EVC.forEach(col=>{const el=document.getElementById('ec-'+col.slice(1));if(el)el.style.border=`2px solid ${col===c?'#fff':'transparent'}`;});
}

function saveModal(){
  if(!aM)return;
  const k=MKEY[aM],id=eId||uid();
  let obj={id};
  if(aM==='einnahme'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),note:gv('f-note')});}
  else if(aM==='ausgabe'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),typ:gv('f-typ')});}
  else if(aM==='schuld'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,total:gn('f-total'),paid:gn('f-paid'),rate:gn('f-rate'),zins:gn('f-zins')});}
  else if(aM==='sparziel'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,ziel:gn('f-ziel'),gespart:gn('f-gespart'),monat:gn('f-monat')});}
  else if(aM==='todo'){const t=gv('f-title');if(!t)return;const old=eId?S.todos.find(x=>x.id===eId):null;Object.assign(obj,{title:t,prio:gv('f-prio'),cat:gv('f-cat'),due:gv('f-due'),note:gv('f-note'),done:old?old.done:false});}
  else if(aM==='event'){const t=gv('f-title');if(!t)return;Object.assign(obj,{title:t,date:gv('f-date'),time:gv('f-time'),end:gv('f-end'),loc:gv('f-loc'),color:gv('f-color')||'#4f8ef7',note:gv('f-note')});}
  else if(aM==='rechnung'){const n=gv('f-name');if(!n)return;const wdk=document.getElementById('f-wdk');const old=eId?S.rech.find(x=>x.id===eId):null;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),due:gv('f-due'),icon:gv('f-icon')||'🧾',wdk:wdk&&wdk.value==='1',status:old?old.status:'offen'});}
  if(eId)S[k]=S[k].map(x=>x.id===eId?obj:x);
  else S[k].push(obj);
  save();closeModal();renderCurrent();
}

function del(k,id){if(!confirm('Wirklich löschen?'))return;S[k]=S[k].filter(x=>x.id!==id);save();renderCurrent();}

function renderCurrent(){
  if(curTab==='home')renderHome();
  else if(curTab==='fin')renderFin();
  else if(curTab==='todo')renderTodos();
  else if(curTab==='kal')renderCal();
  else if(curTab==='rech')renderRech();
}

// ── PWA ───────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── INIT ─────────────────────────────────────────────
load();
initSample();
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('mlbl').textContent=MOS_S[curM]+' '+curY;
renderHome();
renderTodos();
renderRech();
</script>
</body>
</html>
