<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#0a0c12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Mein Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0a0c12;--bg1:#111520;--bg2:#181d2e;--bg3:#1f2640;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --t1:#f0f2ff;--t2:#8892b0;--t3:#4a5275;
  --blue:#4f8ef7;--green:#2dd4a0;--red:#f0614a;--amber:#f5a623;--purple:#a78bfa;
  --sat:env(safe-area-inset-top,20px);--sab:env(safe-area-inset-bottom,0px);
}
html{height:-webkit-fill-available}
body{
  font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg0);
  min-height:100vh;min-height:-webkit-fill-available;
  padding-bottom:calc(80px + var(--sab));
}
.hdr{background:var(--bg0);padding:calc(12px + var(--sat)) 16px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:19px;font-weight:700;background:linear-gradient(135deg,#4f8ef7,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-date{font-size:11px;color:var(--t3);margin-top:2px}
.mnav{display:flex;align-items:center;gap:6px}
.mnav button{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mlbl{font-size:12px;color:var(--t2);min-width:86px;text-align:center;font-weight:500}
.sec{display:none;padding:14px 16px 0}
.sec.active{display:block}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:11px}
.card-ttl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px}
.card-ttl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* PERIOD SWITCHER */
.period-row{display:flex;gap:6px;margin-bottom:14px}
.per-btn{flex:1;padding:8px 4px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-align:center}
.per-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer}
.kpi-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:4px}
.kpi-v{font-size:17px;font-weight:700;letter-spacing:-.5px;line-height:1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:3px}
.cg{color:var(--green)}.cr{color:var(--red)}.cb{color:var(--blue)}.ca{color:var(--amber)}.cp{color:var(--purple)}

/* SUMMARY ROWS */
.sum-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-label{font-size:13px;color:var(--t2)}
.sum-val{font-size:14px;font-weight:700}

.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:11px}
.hero-g{font-size:18px;font-weight:700;margin-bottom:3px}
.hero-s{font-size:12px;color:var(--t3)}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qbtn{padding:13px 8px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--t2);font-size:13px;cursor:pointer;text-align:center;font-family:'Inter',sans-serif}
.qbtn:active{background:var(--bg3)}
.seg{display:flex;gap:3px;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.seg::-webkit-scrollbar{display:none}
.seg-btn{flex:1;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--t3);white-space:nowrap;min-width:60px;font-family:'Inter',sans-serif}
.seg-btn.active{background:var(--bg0);color:var(--t1)}
.irow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.irow:last-child{border-bottom:none}
.ileft{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imeta{font-size:11px;color:var(--t3);margin-top:2px}
.iright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.iamt{font-size:14px;font-weight:700;white-space:nowrap}
.ibtn{width:30px;height:30px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.ibtn:active{opacity:.5}
.add-btn{width:100%;padding:13px;background:var(--bg2);border:1px dashed var(--border2);border-radius:9px;color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-family:'Inter',sans-serif}
.add-btn:active{background:var(--bg3)}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.bdg-r{background:rgba(240,97,74,.15);color:var(--red)}
.bdg-a{background:rgba(245,166,35,.15);color:var(--amber)}
.bdg-b{background:rgba(79,142,247,.15);color:var(--blue)}
.bdg-p{background:rgba(167,139,250,.15);color:var(--purple)}
.pbar-l{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px}
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px}
.bigitem{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.bigitem-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.bigitem-name{font-size:15px;font-weight:600}
.bigitem-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--t2);margin-bottom:10px}
.bigitem-meta b{color:var(--t1)}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.tchk{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:none;font-size:12px;color:#fff}
.tchk.done{background:var(--green);border-color:var(--green)}
.tbody{flex:1;min-width:0}
.ttitle{font-size:14px;font-weight:500}
.ttitle.done{opacity:.4;text-decoration:line-through}
.tmeta2{font-size:11px;color:var(--t3);margin-top:3px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-dh{font-size:10px;color:var(--t3);text-align:center;font-weight:600;padding:4px 0}
.cal-d{min-height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cal-d:active{background:var(--bg3)}
.cal-d.other .cal-n{opacity:.3}
.cal-d.today .cal-n{background:var(--blue);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-d.sel{background:rgba(79,142,247,.15);border:1px solid var(--blue)}
.cal-d.hasev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--amber);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.cal-n{font-size:13px;font-weight:500}
.ev-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ev-item:last-child{border-bottom:none}
.ev-stripe{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500}
.ev-time{font-size:11px;color:var(--t3);margin-top:2px}
.ritem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.ritem:last-child{border-bottom:none}
.ricon{width:36px;height:36px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rbody{flex:1;min-width:0}
.rname{font-size:14px;font-weight:500}
.rdue{font-size:11px;color:var(--t3);margin-top:2px}
.rright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ramt{font-size:14px;font-weight:700}
.frist{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.fok{background:rgba(45,212,160,.15);color:var(--green)}
.fwarn{background:rgba(245,166,35,.15);color:var(--amber)}
.furg{background:rgba(240,97,74,.15);color:var(--red)}
.fdone{background:rgba(100,100,100,.15);color:var(--t3)}
.cw{position:relative;width:100%;height:180px}
.empty{text-align:center;padding:28px 0;color:var(--t3);font-size:13px}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.mbg.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:22px 16px calc(28px + var(--sab));width:100%;max-width:520px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mttl{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:var(--bg3);border:none;color:var(--t2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.frow input,.frow select,.frow textarea{width:100%;padding:12px 13px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;color:var(--t1);font-size:16px;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;resize:none}
.frow input:focus,.frow select:focus{border-color:var(--blue)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1;padding:14px;border-radius:9px;font-size:15px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer}
.bsave{background:var(--blue);color:#fff;border:none}
.bcnl{background:none;border:1px solid var(--border2);color:var(--t2)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,12,18,.97);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border2);display:flex;justify-content:space-around;padding:10px 0 calc(10px + var(--sab));z-index:500}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--t3);cursor:pointer;padding:0 4px;font-size:9px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;min-width:52px;position:relative;font-family:'Inter',sans-serif}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb.active{color:var(--blue)}
.nb-dot{min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;position:absolute;top:-3px;right:2px;padding:0 3px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>◈ Mein Dashboard</h1>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
    <div class="mnav" id="month-ctrl" style="display:none">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="mlbl" id="mlbl"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="sec-home" class="sec active">
  <div class="hero">
    <div class="hero-g" id="greet">Hallo! 👋</div>
    <div class="hero-s" id="hero-sub">Dein monatlicher Überblick</div>
  </div>

  <!-- PERIOD SWITCHER -->
  <div class="period-row">
    <button class="per-btn active" id="per-mo" onclick="setPeriod('monat',this)">📅 Monat</button>
    <button class="per-btn" id="per-wo" onclick="setPeriod('woche',this)">📆 Woche</button>
    <button class="per-btn" id="per-ta" onclick="setPeriod('tag',this)">🕐 Tag</button>
  </div>

  <!-- CASHFLOW KPIS -->
  <div class="kpi-grid" id="home-kpis"></div>

  <!-- CASHFLOW SUMMARY -->
  <div class="card" id="home-summary">
    <div class="card-ttl" id="summary-title">Monatsübersicht</div>
    <div id="summary-rows"></div>
  </div>

  <!-- DRINGENDES -->
  <div class="card">
    <div class="card-ttl">📌 Dringend & Aktuell</div>
    <div id="today-list"></div>
  </div>

  <div class="card">
    <div class="card-ttl">⚡ Schnell hinzufügen</div>
    <div class="quick-grid">
      <button class="qbtn" onclick="openModal('todo')">✅ Todo</button>
      <button class="qbtn" onclick="openModal('event')">📅 Termin</button>
      <button class="qbtn" onclick="openModal('rechnung')">🧾 Rechnung</button>
      <button class="qbtn" onclick="openModal('einnahme')">💰 Einnahme</button>
    </div>
  </div>
</div>

<!-- FINANZEN -->
<div id="sec-fin" class="sec">
  <div class="seg" id="fseg">
    <button class="seg-btn active" onclick="fTab('ue',this)">Übersicht</button>
    <button class="seg-btn" onclick="fTab('ein',this)">Einnahmen</button>
    <button class="seg-btn" onclick="fTab('aus',this)">Ausgaben</button>
    <button class="seg-btn" onclick="fTab('sch',this)">Schulden</button>
    <button class="seg-btn" onclick="fTab('spa',this)">Sparziele</button>
  </div>
  <div id="f-ue">
    <div class="kpi-grid" id="fin-kpis"></div>
    <div class="card"><div class="card-ttl">Cashflow</div><div class="cw"><canvas id="ch-cf"></canvas></div></div>
    <div class="card"><div class="card-ttl">Ausgaben nach Kategorie</div><div class="cw"><canvas id="ch-aus"></canvas></div></div>
  </div>
  <div id="f-ein" style="display:none"><div class="card"><div class="card-ttl" style="color:var(--green)">Einnahmen</div><div id="ein-list"></div><button class="add-btn" onclick="openModal('einnahme')">＋ Einnahme hinzufügen</button></div></div>
  <div id="f-aus" style="display:none"><div class="card"><div class="card-ttl" style="color:var(--red)">Ausgaben</div><div id="aus-list"></div><button class="add-btn" onclick="openModal('ausgabe')">＋ Ausgabe hinzufügen</button></div></div>
  <div id="f-sch" style="display:none"><div id="sch-list"></div><button class="add-btn" onclick="openModal('schuld')">＋ Schuld hinzufügen</button></div>
  <div id="f-spa" style="display:none"><div id="spa-list"></div><button class="add-btn" onclick="openModal('sparziel')">＋ Sparziel hinzufügen</button></div>
</div>

<!-- TODOS -->
<div id="sec-todo" class="sec">
  <div class="seg" id="tseg">
    <button class="seg-btn active" onclick="tFilter('alle',this)">Alle</button>
    <button class="seg-btn" onclick="tFilter('heute',this)">Heute</button>
    <button class="seg-btn" onclick="tFilter('hoch',this)">🔴 Hoch</button>
    <button class="seg-btn" onclick="tFilter('erledigt',this)">✓ Fertig</button>
  </div>
  <div id="todo-list"></div>
  <button class="add-btn" onclick="openModal('todo')">＋ Aufgabe hinzufügen</button>
</div>

<!-- KALENDER -->
<div id="sec-kal" class="sec">
  <div class="card">
    <div class="card-ttl" id="cal-lbl">Kalender</div>
    <div class="cal-grid" id="cal-hdr"></div>
    <div class="cal-grid" id="cal-days"></div>
  </div>
  <div class="card">
    <div class="card-ttl" id="cal-ev-lbl">Termine</div>
    <div id="ev-list"></div>
    <button class="add-btn" onclick="openModal('event')">＋ Termin hinzufügen</button>
  </div>
</div>

<!-- RECHNUNGEN -->
<div id="sec-rech" class="sec">
  <div class="seg" id="rseg">
    <button class="seg-btn active" onclick="rFilter('alle',this)">Alle</button>
    <button class="seg-btn" onclick="rFilter('offen',this)">Offen</button>
    <button class="seg-btn" onclick="rFilter('faellig',this)">Fällig</button>
    <button class="seg-btn" onclick="rFilter('bezahlt',this)">Bezahlt</button>
  </div>
  <div class="card">
    <div class="card-ttl-row">
      <span class="card-ttl" style="margin-bottom:0">Rechnungen & Fristen</span>
      <span id="rech-sum" style="font-size:11px;color:var(--t3)"></span>
    </div>
    <div id="rech-list"></div>
    <button class="add-btn" onclick="openModal('rechnung')">＋ Rechnung hinzufügen</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb active" id="nb-home" onclick="goTab('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </button>
  <button class="nb" id="nb-fin" onclick="goTab('fin',this)">
    <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finanzen
  </button>
  <button class="nb" id="nb-todo" onclick="goTab('todo',this)" style="position:relative">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span id="tdot" class="nb-dot" style="display:none"></span>Todos
  </button>
  <button class="nb" id="nb-kal" onclick="goTab('kal',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Kalender
  </button>
  <button class="nb" id="nb-rech" onclick="goTab('rech',this)" style="position:relative">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span id="rdot" class="nb-dot" style="display:none"></span>Rechnungen
  </button>
</nav>

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="modal">
    <div class="mttl">
      <span id="mttl-txt">Hinzufügen</span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="mfields"></div>
    <div class="mbtns">
      <button class="bcnl" onclick="closeModal()">Abbrechen</button>
      <button class="bsave" onclick="saveModal()">Speichern ✓</button>
    </div>
  </div>
</div>

<script>
const SK='life_v7';
const NOW=new Date(); NOW.setHours(0,0,0,0);
const TODAY=ds(NOW);
let S={ein:[],aus:[],sch:[],spa:[],todos:[],events:[],rech:[]};
let curPeriod='monat';

function ds(d){return d.toISOString().split('T')[0]}
function load(){try{const d=localStorage.getItem(SK);if(d)S=Object.assign(S,JSON.parse(d))}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,5)}
function fmt(v){return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v||0)}
function pct(v,t){return t>0?Math.min(100,Math.round(v/t*100)):0}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():''}
function gn(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0}
function sopts(a,s){return a.map(x=>`<option${x===s?' selected':''}>${x}</option>`).join('')}
function fd(str){if(!str)return'';const d=new Date(str+'T00:00:00');return d.toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'})}

// PERIOD CALCULATIONS
function getPeriodFactor(){
  if(curPeriod==='tag') return 1/30;
  if(curPeriod==='woche') return 7/30;
  return 1; // monat
}
function getPeriodLabel(){
  if(curPeriod==='tag') return 'Tag';
  if(curPeriod==='woche') return 'Woche';
  return 'Monat';
}
function getPeriodSummaryTitle(){
  if(curPeriod==='tag') return 'Tagesübersicht';
  if(curPeriod==='woche') return 'Wochenübersicht';
  return 'Monatsübersicht';
}

function setPeriod(p, btn){
  curPeriod=p;
  document.querySelectorAll('.per-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHome();
}

let curTab='home',fCur='ue',tFilt='alle',rFilt='alle',calSel=TODAY;

function goTab(id,btn){
  curTab=id;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('month-ctrl').style.display=id==='fin'?'flex':'none';
  window.scrollTo(0,0);
  if(id==='home')renderHome();
  else if(id==='fin')renderFin();
  else if(id==='todo')renderTodos();
  else if(id==='kal')renderCal();
  else if(id==='rech')renderRech();
}
function fTab(t,btn){
  fCur=t;
  document.querySelectorAll('#fseg .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['ue','ein','aus','sch','spa'].forEach(x=>document.getElementById('f-'+x).style.display=x===t?'block':'none');
  if(t==='ue')setTimeout(renderFinCharts,60);
}
function tFilter(f,btn){tFilt=f;document.querySelectorAll('#tseg .seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTodos()}
function rFilter(f,btn){rFilt=f;document.querySelectorAll('#rseg .seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRech()}

let chCF=null,chAUS=null;
function renderFinCharts(){
  const te=S.ein.reduce((s,e)=>s+e.amt,0),ta=S.aus.reduce((s,e)=>s+e.amt,0),cf=te-ta;
  if(chCF)chCF.destroy();
  chCF=new Chart(document.getElementById('ch-cf').getContext('2d'),{type:'bar',data:{labels:['Einnahmen','Ausgaben','Cashflow'],datasets:[{data:[te,ta,cf],backgroundColor:['rgba(45,212,160,.8)','rgba(240,97,74,.8)',cf>=0?'rgba(79,142,247,.8)':'rgba(240,97,74,.8)'],borderRadius:8,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#4a5275',font:{size:10},callback:v=>'€'+Math.round(v).toLocaleString('de-DE')},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}},x:{ticks:{color:'#8892b0',font:{size:11}},grid:{display:false},border:{display:false}}}}});
  const cats={};S.aus.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.amt});
  const pal=['#a78bfa','#2dd4a0','#f0614a','#4f8ef7','#f5a623','#f472b6','#34d399','#fb923c'];
  if(chAUS)chAUS.destroy();
  const lbl=Object.keys(cats),val=Object.values(cats);
  chAUS=new Chart(document.getElementById('ch-aus').getContext('2d'),{type:'doughnut',data:{labels:lbl.length?lbl:['Keine Daten'],datasets:[{data:val.length?val:[1],backgroundColor:lbl.length?pal.slice(0,lbl.length):['#252d4a'],borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:'#8892b0',font:{size:10},padding:8,boxWidth:8,boxHeight:8}}}}});
}

const PCOL={hoch:'#f0614a',mittel:'#f5a623',niedrig:'#4f8ef7'};
function renderTodos(){
  let list=[...S.todos];
  if(tFilt==='heute')list=list.filter(t=>!t.done&&t.due===TODAY);
  else if(tFilt==='hoch')list=list.filter(t=>!t.done&&t.prio==='hoch');
  else if(tFilt==='erledigt')list=list.filter(t=>t.done);
  else list=list.filter(t=>!t.done);
  list.sort((a,b)=>({hoch:0,mittel:1,niedrig:2}[a.prio]||1)-({hoch:0,mittel:1,niedrig:2}[b.prio]||1));
  const el=document.getElementById('todo-list');
  if(!list.length){el.innerHTML='<div class="empty">Keine Aufgaben hier.</div>';return;}
  el.innerHTML=list.map(t=>`<div class="todo-item"><div class="pdot" style="background:${PCOL[t.prio]||'#4f8ef7'}"></div><button class="tchk ${t.done?'done':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</button><div class="tbody"><div class="ttitle ${t.done?'done':''}">${t.title}</div><div class="tmeta2">${t.cat?`<span class="bdg bdg-p">${t.cat}</span> `:''}${t.due?'📅 '+fd(t.due):''}${t.due&&t.due<TODAY&&!t.done?' <span style="color:var(--red)">⚠️</span>':''}</div></div><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('todo','${t.id}')">✏️</button><button class="ibtn" onclick="del('todos','${t.id}')">🗑</button></div></div>`).join('');
  const open=S.todos.filter(t=>!t.done).length;
  const dot=document.getElementById('tdot');
  dot.style.display=open>0?'flex':'none';
  dot.textContent=open>9?'9+':open;
}
function toggleTodo(id){const t=S.todos.find(x=>x.id===id);if(t){t.done=!t.done;save();renderTodos();}}

const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
function renderCal(){
  const first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  document.getElementById('cal-lbl').textContent=MOS[curM]+' '+curY;
  document.getElementById('cal-hdr').innerHTML=DAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  let dow=(first.getDay()+6)%7;
  const days=[];
  for(let i=0;i<dow;i++){const x=new Date(curY,curM,1-dow+i);days.push({date:ds(x),num:x.getDate(),other:true});}
  for(let i=1;i<=last.getDate();i++)days.push({date:ds(new Date(curY,curM,i)),num:i,other:false});
  while(days.length%7!==0){const x=new Date(curY,curM+1,days.length-last.getDate()-dow+1);days.push({date:ds(x),num:x.getDate(),other:true});}
  const evd=new Set(S.events.map(e=>e.date));
  document.getElementById('cal-days').innerHTML=days.map(d=>`<div class="cal-d ${d.other?'other':''} ${d.date===TODAY?'today':''} ${d.date===calSel?'sel':''} ${evd.has(d.date)?'hasev':''}" onclick="calSel='${d.date}';renderCal()"><span class="cal-n">${d.num}</span></div>`).join('');
  const evs=calSel===TODAY?S.events.filter(e=>e.date>=TODAY).sort((a,b)=>a.date.localeCompare(b.date)):S.events.filter(e=>e.date===calSel).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('cal-ev-lbl').textContent=calSel===TODAY?'Kommende Termine':'Termine am '+fd(calSel);
  const el=document.getElementById('ev-list');
  if(!evs.length){el.innerHTML='<div class="empty">Keine Termine.</div>';return;}
  el.innerHTML=evs.map(e=>`<div class="ev-item"><div class="ev-stripe" style="background:${e.color||'#4f8ef7'}"></div><div class="ev-body"><div class="ev-title">${e.title}</div><div class="ev-time">${e.date!==calSel?fd(e.date)+' · ':''}${e.time}${e.end?' – '+e.end:''} Uhr${e.loc?' · '+e.loc:''}</div></div><div style="display:flex;gap:5px"><button class="ibtn" onclick="openModal('event','${e.id}')">✏️</button><button class="ibtn" onclick="del('events','${e.id}')">🗑</button></div></div>`).join('');
}

function dDiff(due){const d=new Date(due+'T00:00:00');return Math.round((d-NOW)/864e5)}
function renderRech(){
  let list=[...S.rech];
  if(rFilt==='offen')list=list.filter(r=>r.status==='offen'&&r.due>TODAY);
  else if(rFilt==='faellig')list=list.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY);
  else if(rFilt==='bezahlt')list=list.filter(r=>r.status==='bezahlt');
  list.sort((a,b)=>a.due.localeCompare(b.due));
  const offen=S.rech.filter(r=>r.status!=='bezahlt');
  document.getElementById('rech-sum').textContent=offen.length+' offen · '+fmt(offen.reduce((s,r)=>s+r.amt,0));
  const el=document.getElementById('rech-list');
  if(!list.length){el.innerHTML='<div class="empty">Keine Einträge.</div>';return;}
  el.innerHTML=list.map(r=>{
    const diff=dDiff(r.due),bz=r.status==='bezahlt';
    let fc,ft;
    if(bz){fc='fdone';ft='✓ Bezahlt';}
    else if(diff<0){fc='furg';ft=Math.abs(diff)+'T überfällig';}
    else if(diff===0){fc='furg';ft='Heute fällig!';}
    else if(diff<=5){fc='fwarn';ft='in '+diff+' Tagen';}
    else{fc='fok';ft='in '+diff+' Tagen';}
    return`<div class="ritem"><div class="ricon">${r.icon||'🧾'}</div><div class="rbody"><div class="rname">${r.name}${r.wdk?' 🔄':''}</div><div class="rdue">${r.cat} · ${fd(r.due)}</div></div><div class="rright"><div class="ramt ${bz?'':'ca'}">${fmt(r.amt)}</div><div class="frist ${fc}">${ft}</div><div style="display:flex;gap:4px;margin-top:3px">${!bz?`<button class="ibtn" onclick="payR('${r.id}')" style="width:auto;padding:0 8px;border-radius:6px;font-size:11px">✓ Bezahlt</button>`:''}
    <button class="ibtn" onclick="openModal('rechnung','${r.id}')">✏️</button><button class="ibtn" onclick="del('rech','${r.id}')">🗑</button></div></div></div>`;
  }).join('');
  const f2=S.rech.filter(r=>r.status!=='bezahlt'&&r.due<=TODAY).length;
  const rd=document.getElementById('rdot');rd.style.display=f2>0?'flex':'none';rd.textContent=f2>9?'9+':f2;
}
function payR(id){const r=S.rech.find(x=>x.id===id);if(r){r.status='bezahlt';save();renderRech();}}

let aM=null,eId=null;
const MT={einnahme:'Einnahme',ausgabe:'Ausgabe',schuld:'Schuld/Kredit',sparziel:'Sparziel',todo:'Aufgabe',event:'Termin',rechnung:'Rechnung'};
const MKEY={einnahme:'ein',ausgabe:'aus',schuld:'sch',sparziel:'spa',todo:'todos',event:'events',rechnung:'rech'};
const C_EIN=['Gehalt','Bonus','Nebenjob','Freelance','Mieteinnahmen','Zinsen','Dividenden','Sonstiges'];
const C_AUS=['Miete/Wohnen','Lebensmittel','Transport','KFZ','Versicherungen','Streaming','Handy/Internet','Sport','Kleidung','Restaurant','Drogerie','Urlaub','Sonstiges'];
const C_TODO=['Arbeit','Finanzen','Gesundheit','Haushalt','Familie','Privat','Auto','Einkaufen','Sonstiges'];
const C_RECH=['Wohnen','Auto','Versicherung','Gesundheit','Technik','Abo','Behörde','Sonstiges'];
const EVC=['#4f8ef7','#2dd4a0','#f0614a','#f5a623','#a78bfa','#f472b6'];

function openModal(type,id){
  aM=type;eId=id||null;
  document.getElementById('mttl-txt').textContent=(id?'Bearbeiten: ':'Neu: ')+(MT[type]||type);
  document.getElementById('mfields').innerHTML=buildFields(type,id);
  document.getElementById('mbg').classList.add('open');
  setTimeout(()=>{const f=document.getElementById('f-name')||document.getElementById('f-title');if(f)f.focus();},200);
}
function closeModal(){document.getElementById('mbg').classList.remove('open');aM=null;eId=null;}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===document.getElementById('mbg'))closeModal();});

function getO(type,id){const k=MKEY[type];return id&&S[k]?S[k].find(x=>x.id===id)||{}:{}}
function vv(o,k,fb=''){return o[k]!==undefined?o[k]:fb}

function buildFields(type,id){
  const o=getO(type,id);
  const nf=`<div class="frow"><label>Bezeichnung</label><input id="f-name" type="text" value="${vv(o,'name')}" autocomplete="off" placeholder="Name eingeben..."></div>`;
  const af=`<div class="frow"><label>Betrag (€) pro Monat</label><input id="f-amt" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'amt','')}"></div>`;
  if(type==='einnahme')return nf+af+`<div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_EIN,vv(o,'cat','Gehalt'))}</select></div><div class="frow"><label>Notiz</label><input id="f-note" type="text" value="${vv(o,'note')}" placeholder="Optional..."></div>`;
  if(type==='ausgabe')return nf+af+`<div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_AUS,vv(o,'cat','Miete/Wohnen'))}</select></div><div class="frow"><label>Typ</label><select id="f-typ">${sopts(['Fixkosten','Variabel'],vv(o,'typ','Fixkosten'))}</select></div>`;
  if(type==='schuld')return nf+`<div class="frow2"><div class="frow"><label>Gesamtbetrag (€)</label><input id="f-total" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'total','')}"></div><div class="frow"><label>Bezahlt (€)</label><input id="f-paid" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'paid','')}"></div></div><div class="frow2"><div class="frow"><label>Rate/Monat (€)</label><input id="f-rate" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'rate','')}"></div><div class="frow"><label>Zinssatz (%)</label><input id="f-zins" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'zins','')}"></div></div>`;
  if(type==='sparziel')return nf+`<div class="frow2"><div class="frow"><label>Zielbetrag (€)</label><input id="f-ziel" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'ziel','')}"></div><div class="frow"><label>Gespart (€)</label><input id="f-gespart" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'gespart','')}"></div></div><div class="frow"><label>Einzahlung/Monat (€)</label><input id="f-monat" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal" value="${vv(o,'monat','')}"></div>`;
  if(type==='todo')return`<div class="frow"><label>Aufgabe</label><input id="f-title" type="text" value="${vv(o,'title')}" autocomplete="off" placeholder="Was muss erledigt werden?"></div><div class="frow2"><div class="frow"><label>Priorität</label><select id="f-prio">${sopts(['hoch','mittel','niedrig'],vv(o,'prio','mittel'))}</select></div><div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_TODO,vv(o,'cat','Privat'))}</select></div></div><div class="frow"><label>Fällig am</label><input id="f-due" type="date" value="${vv(o,'due',TODAY)}"></div><div class="frow"><label>Notiz</label><textarea id="f-note" rows="2" placeholder="Optional...">${vv(o,'note')}</textarea></div>`;
  if(type==='event')return`<div class="frow"><label>Titel</label><input id="f-title" type="text" value="${vv(o,'title')}" autocomplete="off" placeholder="z.B. Arzttermin"></div><div class="frow"><label>Datum</label><input id="f-date" type="date" value="${vv(o,'date',calSel)}"></div><div class="frow2"><div class="frow"><label>Von</label><input id="f-time" type="time" value="${vv(o,'time','09:00')}"></div><div class="frow"><label>Bis</label><input id="f-end" type="time" value="${vv(o,'end','10:00')}"></div></div><div class="frow"><label>Ort</label><input id="f-loc" type="text" value="${vv(o,'loc','')}" placeholder="Optional..."></div><div class="frow"><label>Farbe</label><div style="display:flex;gap:8px;margin-top:4px">${EVC.map(c=>`<div onclick="pickCol('${c}')" id="ec${c.slice(1)}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${vv(o,'color','#4f8ef7')===c?'#fff':'transparent'}"></div>`).join('')}</div><input type="hidden" id="f-color" value="${vv(o,'color','#4f8ef7')}"></div><div class="frow"><label>Notiz</label><textarea id="f-note" rows="2" placeholder="Optional...">${vv(o,'note')}</textarea></div>`;
  if(type==='rechnung')return nf+af.replace('pro Monat','')+`<div class="frow2"><div class="frow"><label>Kategorie</label><select id="f-cat">${sopts(C_RECH,vv(o,'cat','Wohnen'))}</select></div><div class="frow"><label>Fällig am</label><input id="f-due" type="date" value="${vv(o,'due',TODAY)}"></div></div><div class="frow2"><div class="frow"><label>Icon (Emoji)</label><input id="f-icon" type="text" placeholder="🧾" value="${vv(o,'icon','🧾')}" maxlength="2"></div><div class="frow"><label>Wiederkehrend</label><select id="f-wdk"><option value="0">Einmalig</option><option value="1" ${vv(o,'wdk',false)?'selected':''}>Ja</option></select></div></div>`;
  return'';
}
function pickCol(c){document.getElementById('f-color').value=c;EVC.forEach(x=>{const el=document.getElementById('ec'+x.slice(1));if(el)el.style.border=`3px solid ${x===c?'#fff':'transparent'}`;});}

function saveModal(){
  if(!aM)return;
  const k=MKEY[aM],id=eId||uid();
  let obj={id};
  if(aM==='einnahme'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),note:gv('f-note')});}
  else if(aM==='ausgabe'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),typ:gv('f-typ')});}
  else if(aM==='schuld'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,total:gn('f-total'),paid:gn('f-paid'),rate:gn('f-rate'),zins:gn('f-zins')});}
  else if(aM==='sparziel'){const n=gv('f-name');if(!n)return;Object.assign(obj,{name:n,ziel:gn('f-ziel'),gespart:gn('f-gespart'),monat:gn('f-monat')});}
  else if(aM==='todo'){const t=gv('f-title');if(!t)return;const old=eId?S.todos.find(x=>x.id===eId):null;Object.assign(obj,{title:t,prio:gv('f-prio'),cat:gv('f-cat'),due:gv('f-due'),note:gv('f-note'),done:old?old.done:false});}
  else if(aM==='event'){const t=gv('f-title');if(!t)return;Object.assign(obj,{title:t,date:gv('f-date'),time:gv('f-time'),end:gv('f-end'),loc:gv('f-loc'),color:gv('f-color')||'#4f8ef7',note:gv('f-note')});}
  else if(aM==='rechnung'){const n=gv('f-name');if(!n)return;const wdk=document.getElementById('f-wdk');const old=eId?S.rech.find(x=>x.id===eId):null;Object.assign(obj,{name:n,amt:gn('f-amt'),cat:gv('f-cat'),due:gv('f-due'),icon:gv('f-icon')||'🧾',wdk:wdk&&wdk.value==='1',status:old?old.status:'offen'});}
  if(eId)S[k]=S[k].map(x=>x.id===eId?obj:x);
  else S[k].push(obj);
  save();closeModal();renderCurrent();
}
function del(k,id){if(!confirm('Wirklich löschen?'))return;S[k]=S[k].filter(x=>x.id!==id);save();renderCurrent();}
function renderCurrent(){
  if(curTab==='home')renderHome();
  else if(curTab==='fin')renderFin();
  else if(curTab==='todo')renderTodos();
  else if(curTab==='kal')renderCal();
  else if(curTab==='rech')renderRech();
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
load();
initSample();
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('mlbl').textContent=MOS_S[curM]+' '+curY;
renderHome();renderTodos();renderRech();
</script>
</body>
</html>
